<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moral Reasoning — Scott Rae's 7-Step Model</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">⚖</div>
      <h2 class="login-title">Moral Reasoning Lab</h2>
      <p class="login-sub">Sign in to continue</p>

      <div class="login-field">
        <label for="loginUser">Username</label>
        <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="login-field">
        <label for="loginPass">Password</label>
        <div class="pass-wrap">
          <input type="password" id="loginPass" placeholder="Enter password"/>
          <button class="toggle-pass" type="button" onclick="togglePassVisibility()" id="togglePassBtn">Show</button>
        </div>
      </div>

      <div class="login-error" id="loginError">Incorrect username or password.</div>

      <button class="btn-login" onclick="attemptLogin()">Sign In</button>

      <p class="login-hint">Scott Rae's 7-Step Model &nbsp;·&nbsp; 10 Dilemmas</p>
    </div>
  </div>

  <!-- MAIN APP (hidden until login) -->
  <div id="appWrapper" style="display:none;">

  <header>
    <h1>Moral Reasoning Lab</h1>
    <p>Scott Rae's 7-Step Model &nbsp;·&nbsp; 10 Ethical Dilemmas</p>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <p class="sidebar-title">Problems</p>
      <ul class="problem-list" id="problemList"></ul>
    </aside>

    <main class="main">

      <div class="card dilemma-card">
        <span class="badge">Dilemma</span>
        <div class="problem-meta" id="problemMeta"></div>
        <h2 class="problem-title" id="problemTitle"></h2>
        <p class="problem-scenario" id="problemScenario"></p>
        <div class="question-box" id="problemQuestion"></div>
      </div>

      <div class="steps-header">
        <span class="badge badge-blue">Scott Rae's 7-Step Moral Reasoning Model</span>
      </div>

      <div class="steps-list" id="stepsList"></div>

      <div class="card conclusion-card">
        <div class="conclusion-label">✦ Moral Conclusion</div>
        <p id="conclusionText"></p>
      </div>

      <div class="nav-row">
        <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">← Previous</button>
        <span id="navCounter"></span>
        <button class="btn-nav btn-next" id="nextBtn" onclick="navigate(1)">Next →</button>
      </div>

    </main>
  </div>

  </div><!-- /appWrapper -->

  <script src="app.js"></script>
</body>
</html>
