<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculus for Computer Science</title>

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="katexReady=true; tryInit();"></script>

  <link rel="stylesheet" href="style.css"/>

  <style>
 
    #loginScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 15% 10%, rgba(45,106,79,0.09) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(200,151,58,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(45,106,79,0.03) 0%, transparent 70%);
      transition: opacity 0.55s ease, visibility 0.55s ease;
    }
    #loginScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
      animation: loginFadeIn 0.6s ease both;
    }
    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-topbar {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1.6rem;
    }
    .login-topbar-line {
      flex: 1;
      height: 1.5px;
      background: linear-gradient(to right, transparent, var(--border2));
    }
    .login-topbar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.4rem 2.2rem 2rem;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.05),
        0 12px 40px rgba(45,106,79,0.08);
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 90px; height: 90px;
      background: radial-gradient(circle at top right, rgba(45,106,79,0.07), transparent 70%);
      border-radius: 0 14px 0 0;
      pointer-events: none;
    }

    .login-emblem {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1.6rem;
    }
    .login-emblem-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(45,106,79,0.3);
    }
    .login-emblem-icon svg {
      width: 20px; height: 20px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .login-emblem-title {
      font-family: 'Lora', serif;
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.2;
    }
    .login-emblem-title em { color: var(--accent); font-style: italic; }
    .login-emblem-sub {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'Source Code Pro', monospace;
    }

    .login-heading {
      font-family: 'Lora', serif;
      font-size: 1.55rem;
      color: var(--text);
      margin-bottom: 0.3rem;
      line-height: 1.25;
    }
    .login-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }

    .login-field { margin-bottom: 1rem; }
    .login-field label {
      display: block;
      font-size: 0.7rem;
      font-family: 'Source Code Pro', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .login-input-wrap { position: relative; }
    .login-input-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px;
      pointer-events: none;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center;
    }
    .login-input-icon svg {
      width: 15px; height: 15px;
      stroke: var(--muted); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke 0.18s;
    }
    .login-field input {
      width: 100%;
      padding: 0.65rem 0.9rem 0.65rem 2.3rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: #fdfcfb;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .login-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
      background: white;
    }
    .login-field input:focus ~ .login-input-icon svg { stroke: var(--accent); }

    .pw-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 2px;
      color: var(--muted);
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--accent); }
    .pw-toggle svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    #pwInput { padding-right: 2.4rem; }

    .login-error {
      display: none;
      align-items: center;
      gap: 0.4rem;
      background: #fdf0ec;
      border: 1px solid rgba(181,69,27,0.3);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.78rem;
      color: var(--accent2);
      margin-bottom: 1rem;
    }
    .login-error.show { display: flex; animation: errShake 0.3s ease; }
    @keyframes errShake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }
    .login-error svg {
      width: 14px; height: 14px;
      stroke: var(--accent2); fill: none;
      stroke-width: 2; flex-shrink: 0;
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      padding: 0.7rem 1rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 3px 10px rgba(45,106,79,0.25);
    }
    .btn-login:hover {
      background: #235c41;
      transform: translateY(-1px);
      box-shadow: 0 5px 16px rgba(45,106,79,0.32);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login svg {
      width: 15px; height: 15px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .login-footer-note {
      margin-top: 1.4rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'Source Code Pro', monospace;
    }
    .login-footer-note span { color: var(--gold); }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.8rem;
    }
    .login-brand-logo {
      width: 46px; height: 46px;
      background: var(--accent);
      color: white;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      font-style: italic;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(45,106,79,0.35);
      letter-spacing: -0.5px;
    }
    .login-brand-name {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }
    .login-brand-name span {
      color: var(--accent);
      font-style: italic;
    }
    .login-brand-sub {
      font-size: 0.67rem;
      color: var(--muted);
      font-family: 'Source Code Pro', monospace;
      margin-top: 0.15rem;
    }

    @media (max-width: 480px) {
      .login-card { padding: 1.8rem 1.4rem 1.6rem; }
      .login-heading { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-logo">67</div>
        <div class="login-brand-text">
          <div class="login-brand-name">Six Seven <span>Review</span></div>
          <div class="login-brand-sub">My will to live approaches zero as x approaches exam day</div>
        </div>
      </div>

      <div class="login-error" id="loginError">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="loginErrorMsg">Invalid username or password.</span>
      </div>

      <div class="login-field">
        <label for="usernameInput">Username</label>
        <div class="login-input-wrap">
          <input type="text" id="usernameInput" placeholder="Enter your username"
            autocomplete="username" onkeydown="handleLoginKey(event)"/>
          <div class="login-input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
      </div>

      <div class="login-field">
        <label for="pwInput">Password</label>
        <div class="login-input-wrap">
          <input type="password" id="pwInput" placeholder="Enter your password"
            autocomplete="current-password" onkeydown="handleLoginKey(event)"/>
          <div class="login-input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <button class="pw-toggle" type="button" onclick="togglePw()" title="Show/hide password" tabindex="-1">
            <svg id="eyeIcon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" onclick="attemptLogin()">
        Log In
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div class="login-footer-note">
        Access restricted · <span>Authorized users only</span>
      </div>
    </div>
  </div>
</div>

<div id="siteRoot" style="display:none">
  <header>
    <div class="header-inner">
      <div class="header-top">
        <div class="site-title"><em>Calculus for Computer Science</em> — 1st Sem</div>
        <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;justify-content:flex-end;">
          <button class="formula-toggle" id="formulaToggle" onclick="toggleFormulas()">
            <div class="toggle-pip"></div>
            Formulas
          </button>
          <div class="site-sub" id="siteSub">1 · Tangent Lines</div>
        </div>
      </div>
      <div class="topic-nav-wrap">
        <button class="nav-toggle" id="navToggle" onclick="toggleNav()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Topics
        </button>
        <nav class="topic-nav" id="topicNav">
          <button class="topic-btn active" onclick="showSection(0,this)"><span class="topic-num">1</span> Tangent Lines</button>
          <button class="topic-btn" onclick="showSection(1,this)"><span class="topic-num">2</span> Limit Laws</button>
          <button class="topic-btn" onclick="showSection(2,this)"><span class="topic-num">3</span> Polynomial Limits</button>
          <button class="topic-btn" onclick="showSection(3,this)"><span class="topic-num">4</span> Limits at ∞</button>
          <button class="topic-btn" onclick="showSection(4,this)"><span class="topic-num">5</span> Continuity</button>
          <button class="topic-btn" onclick="showSection(5,this)"><span class="topic-num">6</span> Limit Def. Deriv.</button>
          <button class="topic-btn" onclick="showSection(6,this)"><span class="topic-num">7</span> Diff. Rules</button>
        </nav>
      </div>
    </div>
  </header>
  <main id="mainContent"></main>
</div>

<script src="script.js"></script>

<script>

  const USERS = {
    'lhoel': 'black67#',
    'vince': '@black67',
    'hertz': 'black67@',
    'kian':  '#black67'
  };

  let loginAttempts = 0;
  let katexReady = false;
  let siteUnlocked = false;

  const SESSION_KEY = 'calccs_auth';

  function unlockSite() {
    const loginScreen = document.getElementById('loginScreen');
    loginScreen.style.display = 'none';
    document.getElementById('siteRoot').style.display = '';
    siteUnlocked = true;
    if (katexReady) render();
  }

  (function checkSession() {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved && USERS[saved] !== undefined) {
      unlockSite(); 
    }
  })();

  function attemptLogin() {
    const username = document.getElementById('usernameInput').value.trim().toLowerCase();
    const password = document.getElementById('pwInput').value;
    const errBox   = document.getElementById('loginError');
    const errMsg   = document.getElementById('loginErrorMsg');

    if (loginAttempts >= 5) {
      errMsg.textContent = 'Too many attempts. Please refresh and try again.';
      errBox.classList.remove('show');
      void errBox.offsetWidth;
      errBox.classList.add('show');
      return;
    }

    if (USERS[username] !== undefined && USERS[username] === password) {
      localStorage.setItem(SESSION_KEY, username);
      errBox.classList.remove('show');
      const loginScreen = document.getElementById('loginScreen');
      loginScreen.classList.add('hidden');

      setTimeout(() => {
        unlockSite();
      }, 580);

    } else {
      loginAttempts++;
      errMsg.textContent = loginAttempts >= 5
        ? 'Too many failed attempts. Please refresh the page.'
        : 'Invalid username or password. Please try again.';
      errBox.classList.remove('show');
      void errBox.offsetWidth;
      errBox.classList.add('show');
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function handleLoginKey(e) {
    if (e.key === 'Enter') attemptLogin();
  }

  function togglePw() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }

  function tryInit() {
    katexReady = true;
    if (siteUnlocked) render();
  }

  window.addEventListener('load', () => {
    if (!siteUnlocked) {
      document.getElementById('usernameInput').focus();
    }
  });
</script>
</body>
</html>
